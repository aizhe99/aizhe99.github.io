baseURL: "https://ablog.v6.rocks/"
defaultContentLanguage: zh
languageCode: zh-cn
title: 周记
theme: PaperMod

enableRobotsTXT: true
buildDrafts: false
buildFuture: false
buildExpired: false

hasCJKLanguage: true

menu:
  main:
    - identifier: categories
      name: 分类
      url: /categories/
      weight: 10
    - identifier: tags
      name: 标签
      url: /tags/
      weight: 20
    - identifier: archives
      name: 全部文章
      url: /archives/
      weight: 30
    - identifier: search
      name: 搜索
      url: /search/
      weight: 40
    - identifier: rss
      name: RSS
      url: /index.xml
      weight: 50

params:
  env: production
  title: 周记
  description: "一次性人生"
  keywords: [Blog, Book, Life, TV]
  author: 我
  defaultTheme: auto
  comments: true
  ShowPostNavLinks: true
  ShowReadingTime: false
  ShowWordCount: true
  ShowFullTextContent: true

  assets:
    favicon: "/favicon.ico"
    favicon16x16: "/favicon-16x16.png"
    favicon32x32: "/favicon-32x32.png"
    apple_touch_icon: "/apple-touch-icon.png"
    # safari_pinned_tab: "/safari-pinned-tab.svg"
    webmanifest: "/site.webmanifest"

  fuseOpts:
    isCaseSensitive: false
    shouldSort: true
    location: 0
    distance: 1000
    threshold: 0.4
    minMatchCharLength: 0
    keys: ["title", "permalink", "summary", "content"]

  footer:
    text: "人生只有一次，有些事要抓紧，有些事要放开。"
    # copyright: "&copy; 2026 一次性人生"
    hideCopyright: false

  # 注意：socialIcons 在禁用了 homeInfoParams 后，默认不会在首页显示。
  # 保留此配置仅用于侧边栏或启用了Profile模式的情况。
  socialIcons:
    - name: rss
      url: "https://ablog.v6.rocks/index.xml"

  # 确保 homeInfoParams 被完全注释或删除，以保证进入列表模式
  # homeInfoParams:
  #   Title: "你好"
  #   Content: "..."

# Hugo 日期提取策略配置
frontmatter:
  date:
    # 优先级 1: 从文件名提取 (对应 Jekyll 风格的 YYYY-MM-DD-slug.md)
    - :filename
    # 优先级 2: 如果文件名没有日期，则读取 Front Matter 中的 date 字段
    - :default

outputs:
  home:
    - HTML
    - RSS
    - JSON
